<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>库存分析看板 表格对比分析</title>
  <link rel="stylesheet" href="styles.css?v=20260612h">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>库存分析看板</strong>
        <span>供应链维护更新</span>
      </div>
      <nav class="nav">
        <a href="receipt-summary.html">供应链库存分析</a>
        <a href="sales-analysis.html">销售数据分析</a>
        <a class="active" href="comparison.html">表格对比分析</a>
        <a href="fact-library.html">库存数据文件</a>
        <a href="sales-library.html">销售数据文件</a>
        <a href="file-library.html">维度表文件库</a>
        <a href="errors.html">报错信息提示</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>表格对比分析</h1>
          <p>分析关账后库存事实表与库存分析月份表的数量差异、真实成本与结算价差异。</p>
        </div>
        <div class="status-pill" id="compareStatus">正在读取文件库...</div>
      </header>

      <section class="toolbar">
        <select id="diffTypeFilter">
          <option value="qty">数量差异</option>
          <option value="price">价格差异</option>
        </select>
        <select id="departmentFilter"></select>
        <select id="productLineFilter"></select>
        <select id="seriesFilter"></select>
        <button id="refreshBtn" type="button">应用刷新</button>
        <button id="downloadBtn" class="secondary" type="button">下载当前明细</button>
      </section>

      <div id="sourcePanel" class="data-source-panel"></div>

      <section class="metrics comparison-metrics">
        <div class="metric-card"><span>关账后库存数量</span><strong id="inventoryQtyTotal">0</strong></div>
        <div class="metric-card"><span>0430结余库存数量</span><strong id="detailQtyTotal">0</strong></div>
        <div class="metric-card"><span>数量差异</span><strong id="qtyDiffTotal">0</strong></div>
        <div class="metric-card"><span>库存资产估值</span><strong id="inventoryValueTotal">¥0</strong></div>
        <div class="metric-card"><span>0430库存资产</span><strong id="detailValueTotal">¥0</strong></div>
        <div class="metric-card"><span>资产差异</span><strong id="valueDiffTotal">¥0</strong></div>
      </section>

      <section class="comparison-summary">
        <strong>匹配口径</strong>
        <span id="matchBasis">正在识别字段...</span>
      </section>

      <section class="error-section">
        <div class="table-title" id="diffTableTitle">数量差异：结存数量 vs 0430结余库存数量</div>
        <div class="table-panel comparison-table">
          <table>
            <thead id="diffTableHead"></thead>
            <tbody id="diffTableRows"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="storage.js?v=20260611k"></script>
<script src="shared-library.js?v=20260616j"></script>
  <script src="comparison.js?v=20260602m"></script>
</body>
</html>
