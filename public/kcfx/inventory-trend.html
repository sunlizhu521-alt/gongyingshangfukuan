<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>库存分析看板 库存货值-模板</title>
  <link rel="stylesheet" href="styles.css?v=20260612h">
</head>
<body class="receipt-page">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>库存分析看板</strong>
        <span>供应链维护更新</span>
      </div>
      <nav class="nav">
        <a href="receipt-summary.html">供应链库存分析</a>
        <a href="sales-analysis.html">销售数据分析</a>
        <a href="comparison.html">表格对比分析</a>
        <a href="fact-library.html">库存数据文件</a>
        <a href="sales-library.html">销售数据文件</a>
        <a href="file-library.html">维度表文件库</a>
        <a href="errors.html">报错信息提示</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>库存货值-模板</h1>
          <p id="summaryStatus" class="status-line">正在读取文件库...</p>
        </div>
      </header>

      <section class="toolbar trend-filter-toolbar">
        <div id="warehouseTypeTrendFilter" class="multi-filter"></div>
        <div id="departmentTrendFilter" class="multi-filter"></div>
        <div id="productTrendFilter" class="multi-filter"></div>
        <div id="seriesTrendFilter" class="multi-filter"></div>
        <div id="warehouseLocationTrendFilter" class="multi-filter"></div>
        <button id="clearTrendFiltersBtn" type="button">显示全部库存</button>
      </section>

      <section class="trend-chart-grid">
        <div class="panel trend-panel">
          <h2>库存货值 <span id="inventoryValueTrendTotal" class="chart-total"></span></h2>
          <div id="inventoryValueTrendChart" class="vertical-trend-chart"></div>
        </div>
        <div class="panel trend-panel">
          <h2>库存趋势变化（库存数量维度） <span id="inventoryQtyTrendTotal" class="chart-total"></span></h2>
          <div id="inventoryQtyTrendChart" class="vertical-trend-chart"></div>
        </div>
      </section>

      <div id="sourcePanel" class="data-source-panel"></div>

      <section class="table-panel trend-detail-panel">
        <div class="table-title-row">
          <div class="table-title">未区分事业部 / 未区分产品线 / 未分类仓库位置明细</div>
          <button id="downloadTrendUnclassifiedBtn" class="secondary compact-button" type="button">下载</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>月份</th>
              <th>缺失项</th>
              <th>A列</th>
              <th>物料编码(B列)</th>
              <th>物料名称(C列)</th>
              <th>仓库(D列)</th>
              <th>K列数量</th>
              <th>事业部</th>
              <th>销售产品线</th>
              <th>仓库位置</th>
            </tr>
          </thead>
          <tbody id="trendUnclassifiedRows"></tbody>
        </table>
      </section>
    </main>
  </div>

  <script src="storage.js?v=20260611k"></script>
<script src="shared-library.js?v=20260616j"></script>
<script src="inventory-trend.js?v=20260616a"></script>
</body>
</html>
