<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>库存分析看板 销售数据分析</title>
  <link rel="stylesheet" href="styles.css?v=20260612h">
</head>
<body class="receipt-page">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>库存分析看板</strong>
        <span>供应链维护更新</span>
      </div>
      <nav class="nav">
        <a href="receipt-summary.html">供应链库存分析</a>
        <a class="active" href="sales-analysis.html">销售数据分析</a>
        <a href="comparison.html">表格对比分析</a>
        <a href="fact-library.html">库存数据文件</a>
        <a href="sales-library.html">销售数据文件</a>
        <a href="file-library.html">维度表文件库</a>
        <a href="errors.html">报错信息提示</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>销售数据分析</h1>
          <p id="salesStatus" class="status-line">正在读取销售数据文件...</p>
        </div>
      </header>

      <section class="analysis-section analysis-section-main">
        <div class="analysis-section-title">销售数据分析</div>
        <section class="toolbar primary-filter-toolbar">
          <div id="salesMonthFilter" class="month-picker"></div>
          <div id="salesOrgFilter" class="multi-filter"></div>
          <div id="salesStoreShortNameFilter" class="multi-filter"></div>
          <div id="customerFilter" class="multi-filter"></div>
          <div id="productLineFilter" class="multi-filter"></div>
          <div id="materialFilter" class="multi-filter"></div>
          <input id="searchInput" placeholder="客户名称 / 型号 / 物料名称">
          <button id="clearFiltersBtn" type="button">清除所有筛选</button>
        </section>

        <section class="metrics comparison-metrics receipt-metrics">
          <div class="metric-card"><span>应收数量合计</span><strong id="salesQtyTotal">0.00</strong></div>
          <div class="metric-card"><span>客户数量</span><strong id="customerTotal">0</strong></div>
        </section>

        <section class="dashboard-grid receipt-chart-grid">
          <div class="panel">
            <h2>全部销售部门 <span id="customerQtyTotal" class="chart-total"></span></h2>
            <div id="customerQtyChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>店铺简称（日常汇报沟通简称） <span id="salesOrgQtyTotal" class="chart-total"></span></h2>
            <div id="salesOrgQtyChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>销售产品线 <span id="productLineQtyTotal" class="chart-total"></span></h2>
            <div id="productLineQtyChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>销售系列 <span id="materialQtyTotal" class="chart-total"></span></h2>
            <div id="materialQtyChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>型号 <span id="storeMatchQtyTotal" class="chart-total"></span></h2>
            <div id="storeMatchQtyChart" class="chart-bars"></div>
          </div>
        </section>
      </section>

      <section class="trend-embed-panel analysis-section-trend">
        <div class="table-title-row">
          <div>
            <div class="table-title">销售趋势变化</div>
            <p id="salesInventoryTrendStatus" class="status-line">正在读取销售数据日期列...</p>
          </div>
        </div>
        <section class="toolbar trend-filter-toolbar">
          <div id="salesInventoryMonthTrendFilter" class="month-picker"></div>
          <div id="salesInventoryOrgTrendFilter" class="multi-filter"></div>
          <div id="salesInventoryStoreShortNameTrendFilter" class="multi-filter"></div>
          <div id="salesInventoryProductTrendFilter" class="multi-filter"></div>
          <div id="salesInventorySeriesTrendFilter" class="multi-filter"></div>
          <div id="salesInventoryModelTrendFilter" class="multi-filter"></div>
          <button id="clearSalesInventoryTrendFiltersBtn" type="button">清除所有筛选</button>
        </section>
        <section class="trend-chart-grid">
          <div class="panel trend-panel">
            <h2>销售趋势 <span id="salesInventoryTrendCondition" class="trend-condition"></span><span id="salesInventoryValueTrendTotal" class="chart-total"></span></h2>
            <div id="salesInventoryValueTrendChart" class="vertical-trend-chart"></div>
          </div>
        </section>
      </section>

      <section class="analysis-section analysis-section-tables">
        <div class="analysis-section-title">销售数据明细表</div>
        <section class="table-panel">
          <div class="table-title-row">
            <div class="table-title">销售数据文件明细</div>
            <button id="downloadBtn" class="secondary compact-button" type="button">下载</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>销售月份</th>
                <th>销售部门</th>
                <th>客户名称</th>
                <th>物料名称</th>
                <th>销售产品线</th>
                <th>销售系列</th>
                <th>型号</th>
                <th>应收数量</th>
              </tr>
            </thead>
            <tbody id="salesRows"></tbody>
          </table>
        </section>
      </section>

      <div id="sourcePanel" class="data-source-panel"></div>
    </main>
  </div>

  <script src="storage.js?v=20260611k"></script>
<script src="shared-library.js?v=20260616l"></script>
<script src="sales-analysis.js?v=20260616l"></script>
</body>
</html>
