<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>库存分析看板 120天以上库存导航-模板</title>
  <link rel="stylesheet" href="styles.css?v=20260612h">
</head>
<body class="receipt-page over120-page">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>库存分析看板</strong>
        <span>供应链维护更新</span>
      </div>
      <nav class="nav">
        <a href="receipt-summary.html">供应链库存分析</a>
        <a href="sales-analysis.html">销售数据分析</a>
        <a href="comparison.html">表格对比分析</a>
        <a href="fact-library.html">库存数据文件</a>
        <a href="sales-library.html">销售数据文件</a>
        <a href="file-library.html">维度表文件库</a>
        <a href="errors.html">报错信息提示</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>120天以上库存导航-模板</h1>
          <p id="over120Status" class="status-line">正在读取文件库...</p>
        </div>
      </header>

      <section class="analysis-section analysis-section-main">
        <div class="analysis-section-title">120天以上库存分析</div>
        <section class="toolbar over120-toolbar">
          <div id="warehouseTypeFilter" class="multi-filter"></div>
          <div id="departmentFilter" class="multi-filter"></div>
          <div id="productLineFilter" class="multi-filter"></div>
          <div id="seriesFilter" class="multi-filter"></div>
          <div id="ageFilter" class="multi-filter"></div>
          <div id="warehouseLocationFilter" class="multi-filter"></div>
          <div id="logisticsStatusFilter" class="multi-filter"></div>
          <div id="inventoryTypeFilter" class="multi-filter"></div>
          <input id="searchInput" placeholder="仓库 / 物料编码 / 物料名称 / 原因">
          <button id="refreshBtn" type="button">清除所有筛选</button>
        </section>

        <section class="dashboard-grid receipt-chart-grid">
          <div class="panel">
            <h2>仓库类型库存情况 <span id="warehouseTypeAmountTotal" class="chart-total"></span></h2>
            <div id="warehouseTypeAmountChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>事业部库存情况 <span id="departmentAmountTotal" class="chart-total"></span></h2>
            <div id="departmentAmountChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>各产品线库存情况 <span id="productLineAmountTotal" class="chart-total"></span></h2>
            <div id="productLineAmountChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>产品系列库存情况 <span id="seriesAmountTotal" class="chart-total"></span></h2>
            <div id="seriesAmountChart" class="chart-bars"></div>
          </div>
          <div class="panel">
            <h2>仓库位置库存情况 <span id="warehouseLocationAmountTotal" class="chart-total"></span></h2>
            <div id="warehouseLocationAmountChart" class="chart-bars"></div>
          </div>
        </section>
      </section>

      <section class="analysis-section analysis-section-tables">
        <div class="analysis-section-title">120天以上库存明细</div>
        <section class="table-panel">
          <div class="table-title-row">
            <div class="table-title">库存明细表</div>
            <button id="downloadBtn" class="secondary compact-button" type="button">下载</button>
          </div>
          <table>
            <thead>
              <tr>
                <th>仓库名称</th>
                <th>物料编码</th>
                <th>物料名称</th>
                <th>0430结余库存数量</th>
                <th>结算价(含税)</th>
                <th>库存总额</th>
                <th>原因</th>
              </tr>
            </thead>
            <tbody id="detailRows"></tbody>
          </table>
        </section>
      </section>

      <div id="sourcePanel" class="data-source-panel"></div>
    </main>
  </div>

  <script src="storage.js?v=20260611k"></script>
<script src="shared-library.js?v=20260616j"></script>
<script src="over-120.js?v=20260616a"></script>
</body>
</html>
