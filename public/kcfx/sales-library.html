<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>库存分析看板 销售数据文件</title>
  <link rel="stylesheet" href="styles.css?v=20260616e">
</head>
<body data-library-type="sales">
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <strong>库存分析看板</strong>
        <span>供应链维护更新</span>
      </div>
      <nav class="nav">
        <a href="receipt-summary.html">供应链库存分析</a>
        <a href="sales-analysis.html">销售数据分析</a>
        <a href="comparison.html">表格对比分析</a>
        <a href="fact-library.html">库存数据文件</a>
        <a class="active" href="sales-library.html">销售数据文件</a>
        <a href="file-library.html">维度表文件库</a>
        <a href="errors.html">报错信息提示</a>
      </nav>
    </aside>

    <main class="content">
      <header class="topbar">
        <div>
          <h1>销售数据文件</h1>
          <p>上传销售数据文件。后续销售分析或库存联动分析会按该槽位读取并应用。</p>
        </div>
        <div class="topbar-actions">
          <button id="uploadAllServerBtn" type="button">一键上传至腾讯云服务器</button>
          <button id="applyAllBtn" class="secondary" type="button">一键全部应用刷新</button>
          <button id="clearCacheBtn" class="danger" type="button">清除缓存</button>
        </div>
      </header>

      <section class="library-summary">
        <div class="summary-head">
          <div>
            <span id="libraryEyebrow" class="summary-eyebrow">SALES FILES</span>
            <h2 id="libraryTitle">销售数据文件</h2>
          </div>
          <span id="savedBadge" class="saved-badge">销售数据文件已保存</span>
        </div>
        <div class="summary-metrics">
          <div><span>销售文件上限</span><strong id="slotLimit">0</strong></div>
          <div><span>已上传销售文件</span><strong id="uploadedCount">0</strong></div>
          <div><span>已应用销售文件</span><strong id="appliedCount">0</strong></div>
          <div><span>最近更新</span><strong id="latestUpdate">-</strong></div>
        </div>
        <div class="toolbar">
          <button id="refreshBtn" type="button">应用刷新</button>
          <button id="downloadSharedBtn" class="secondary" type="button">导出共享数据包</button>
          <button id="importSharedBtn" class="secondary" type="button">导入共享数据包</button>
          <input id="importSharedInput" class="hidden-file-input" type="file" accept=".json">
          <span class="muted" id="sharedStatus">正在同步共享文件库...</span>
        </div>
      </section>

      <section id="libraryGrid" class="library-grid"></section>
    </main>
  </div>

  <script src="vendor/xlsx.full.min.js?v=20260611b"></script>
  <script src="storage.js?v=20260611k"></script>
<script src="shared-library.js?v=20260616k"></script>
<script src="library-page.js?v=20260616k"></script>
</body>
</html>
